<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>会员中心</title>
</head>

<body class="m-c">
  <div class="m-c__header">
    <img class="m-c__merchant-logo" id="logo" src="https://union-click.jd.com/jdc?d=iEZf6v"></img><span
      class="m-c__merchant-name" id="brandName">brandName</span>
  </div>
  <div class="m-c__card" id="js-card">
    <div class="m-c-card__name" id="title">title</div>
    <div class="m-c-card__content">
      <div class="m-c-card__avatar">
        <!-- <img class="m-c-card__avatar-img" id='avatar'
          src="https://joypay.oss-cn-beijing.aliyuncs.com/member/member_avatar.png" />
        <img class="m-c-card__avatar-vip-mark" id="tag"
          src="https://joypay.oss-cn-beijing.aliyuncs.com/member/member_tag.png"></img> -->
        <img class="m-c-card__avatar-img" id='avatar' src="../images/member_avatar.png" />
        <img class="m-c-card__avatar-vip-mark" id='avatar' src="../images/member_tag.png" />
      </div>
      <div class="m-c-card__nickname" id="name">name</div>
      <div class="m-c-card__info">
        <div class="m-c-card__info-item">
          <div class="m-c-card__title">积分</div>
          <div class="m-c-card__val" id="bonus">0</div>
        </div>
        <div class="m-c-card__info-item">
          <div class="m-c-card__title">余额</div>
          <div class="m-c-card__val" id="banlance">0元</div>
        </div>
        <div class="m-c-card__info-item">
          <div class="m-c-card__title">等级</div>
          <div class="m-c-card__val" id='levelName'>默认</div>
        </div>
      </div>
    </div>
  </div>
  <div class="m-c__coupons">
    <div class="m-c__merchant-name">可用优惠劵</div>
    <div id="js-coupon">
      无
    </div>

  </div>


</body>

</html>
