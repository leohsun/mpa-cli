<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>joypay</title>
  <link rel="stylesheet" href="../css/tip.css">
</head>

<body>
  <!-- <header class="tip__header">
    <div class="tip__go-back"></div>
  </header> -->
  <div class="tip__content">
    <img src="../images/warning.png" alt="" srcset="">
    <h3 class="tip__content-title">支付失败</h3>
  </div>
  <button class="tip__submit">重新支付</button>
</body>


<script>
  window.onload = function () {
    const submitBtn = document.querySelector('.tip__submit')
    const qStr = window.location.search
    const startIdx = qStr.indexOf('=') + 1
    const msg = qStr.slice(startIdx)

    document.querySelector('.tip__content-title').innerText = decodeURIComponent(msg)
    submitBtn.style.display = 'none'

  }
</script>

</html>
