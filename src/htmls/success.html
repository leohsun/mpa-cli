<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>支付成功-交子joypay</title>
  <script src="../scripts/axios.js"></script>
  <script src="../scripts/config.js"></script>
  <link rel="stylesheet" href="../css/success.css">
</head>

<body class="success">
  <div class="success__header"></div>
  <div class="success__content">
    <img src="../images/success.png" alt="" srcset="">
    <h2>支付成功</h2>
    <h1 class="success__amount">¥0</h1>
  </div>
  <ul class="success__list">
    <li class="success__list-item"><span class="success__order-no">0</span>订单编号</li>
    <li class="success__list-item"><span class="success__order-pay-channel">0</span>支付方式</li>
    <li class="success__list-item"><span class="success__order-pay-time">0</span>交易时间</li>
  </ul>

  <script>
    window.onload = function () {
      localStorage.removeItem('order_no')
      const qStr = window.location.search.slice(1)
      const params = qStr.split('&').reduce((s, n) => {
        const rawN = n.split('=')
        return Object.assign({}, s, { [rawN[0]]: rawN[1] })
      }, {})
      const amountEl = document.querySelector('.success__amount')
      const orderNoEl = document.querySelector('.success__order-no')
      const orderPayChannelEl = document.querySelector('.success__order-pay-channel')
      const orderPayTimeEl = document.querySelector('.success__order-pay-time')
      amountEl.innerHTML = params.totalFree
      orderNoEl.innerHTML = params.orderNo
      orderPayChannelEl.innerHTML = decodeURIComponent(params.payChannel)
      orderPayTimeEl.innerHTML = decodeURIComponent(params.payTime)
    }
  </script>

</body>

</html>
